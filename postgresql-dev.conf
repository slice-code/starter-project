# PostgreSQL Development Performance Tuning
# Mount to: /etc/postgresql/postgresql.conf

# ==========================================
# CONNECTIONS
# ==========================================

listen_addresses = '*'              # Accept connections from all interfaces
port = 5432                         # Default PostgreSQL port
max_connections = 50                # Default: 100 (reduce for dev, save memory)
superuser_reserved_connections = 3  # Reserve for admin

# ==========================================
# MEMORY SETTINGS (Optimize for dev machine with 8-16GB RAM)
# ==========================================

# Increase shared memory for caching
shared_buffers = 512MB              # Default: 128MB (25% of RAM untuk dev)
effective_cache_size = 2GB          # Default: 4GB (OS cache estimate)
work_mem = 64MB                     # Default: 4MB (per-query sort/hash memory)
maintenance_work_mem = 256MB        # Default: 64MB (VACUUM, CREATE INDEX)

# ==========================================
# WRITE-AHEAD LOG (WAL) - Faster writes
# ==========================================

wal_buffers = 16MB                  # Default: -1 (auto, ~64KB)
checkpoint_completion_target = 0.9  # Spread checkpoint I/O over time
max_wal_size = 2GB                  # Default: 1GB
min_wal_size = 512MB                # Default: 80MB

# ==========================================
# QUERY TUNING
# ==========================================

random_page_cost = 1.1              # Default: 4.0 (SSD optimization)
effective_io_concurrency = 200      # Default: 1 (SSD can handle more)
default_statistics_target = 200     # Default: 100 (better query plans)

# ==========================================
# AUTOVACUUM (Keep DB healthy)
# ==========================================

autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s            # Default: 1min (run more frequently)
autovacuum_vacuum_threshold = 50    # Default: 50
autovacuum_analyze_threshold = 50   # Default: 50
autovacuum_vacuum_scale_factor = 0.1   # Default: 0.2 (vacuum at 10% change)
autovacuum_analyze_scale_factor = 0.05 # Default: 0.1 (analyze at 5% change)

# ==========================================
# LOGGING (Minimal for performance)
# ==========================================

log_min_duration_statement = 1000   # Log queries > 1 second
log_checkpoints = on
log_connections = off               # Reduce I/O
log_disconnections = off            # Reduce I/O
log_lock_waits = on
log_temp_files = 0                  # Log all temp file usage
log_autovacuum_min_duration = 0     # Log all autovacuum runs

# ==========================================
# PARALLEL QUERY (Faster complex queries)
# ==========================================

max_parallel_workers_per_gather = 2  # Default: 2
max_parallel_workers = 4             # Default: 8
max_parallel_maintenance_workers = 2 # Default: 2
