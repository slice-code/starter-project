# Development Environment - PostgreSQL (sama dengan production)
services:
  postgres:
    image: postgres:16-alpine
    container_name: starterdb-db
    environment:
      POSTGRES_USER: pjtki_dev
      POSTGRES_PASSWORD: dev_password_123
      POSTGRES_DB: starterdb
    ports:
      - "5433:5432"
    volumes:
      - dev_data:/var/lib/postgresql/data
      - ./postgresql-dev.conf:/etc/postgresql/postgresql.conf
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    shm_size: 1gb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pjtki_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G  # Max memory for PostgreSQL
          cpus: '2.0'  # CPU limit
        reservations:
          memory: 512M
          cpus: '1.0'

volumes:
  dev_data:
