# PostgreSQL Production Performance Configuration
# Optimized for production server (16GB+ RAM, SSD)

# ==========================================
# MEMORY SETTINGS
# ==========================================

shared_buffers = 2GB                  # 25% of RAM (for 8GB server)
effective_cache_size = 6GB            # 75% of RAM
work_mem = 128MB                      # Per-query memory (adjust based on connections)
maintenance_work_mem = 512MB          # For VACUUM, CREATE INDEX

# ==========================================
# WRITE-AHEAD LOG (WAL)
# ==========================================

wal_buffers = 64MB
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB

# ==========================================
# QUERY OPTIMIZATION
# ==========================================

random_page_cost = 1.1                # SSD optimization
effective_io_concurrency = 200        # SSD parallel I/O
default_statistics_target = 200       # Better query plans

# ==========================================
# CONNECTIONS
# ==========================================

max_connections = 100
superuser_reserved_connections = 3

# ==========================================
# PARALLEL QUERY
# ==========================================

max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# ==========================================
# AUTOVACUUM (Production tuning)
# ==========================================

autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 20s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_delay = 2      # Reduce I/O impact

# ==========================================
# LOGGING (Production - minimal)
# ==========================================

log_min_duration_statement = 2000     # Log queries > 2 seconds
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0
log_statement = 'none'                # Reduce logging overhead
log_line_prefix = '%m [%p] %q%u@%d '  # Minimal prefix

# ==========================================
# DURABILITY (Production - don't compromise)
# ==========================================

fsync = on                            # MUST be ON for production
synchronous_commit = on               # MUST be ON for production
full_page_writes = on                 # MUST be ON for production
